services:
  postgres:
    image: postgres:15-alpine
    container_name: flathackswiki-db
    environment:
      POSTGRES_USER: wikiuser
      POSTGRES_PASSWORD: wikipass
      POSTGRES_DB: flathacks_wiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikiuser -d flathacks_wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: flathackswiki-api
    environment:
      DATABASE_URL: postgresql://wikiuser:wikipass@postgres:5432/flathacks_wiki?schema=public
      JWT_SECRET: change-this-super-secret-jwt-key-in-production-minimum-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_ENV: development
      APP_PORT: 3001
      APP_URL: http://localhost:3001
      FRONTEND_URL: http://localhost
      CORS_ORIGIN: http://localhost:80
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/uploads
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-Zentrales Konto}
      OIDC_ISSUER: ${OIDC_ISSUER:-http://host.docker.internal:8081/realms/flathackwiki}
      OIDC_PUBLIC_ISSUER: ${OIDC_PUBLIC_ISSUER:-http://localhost:8081/realms/flathackwiki}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-flathackwiki}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3001/api/v1/auth/oidc/callback}
      OIDC_TOKEN_AUTH_METHOD: ${OIDC_TOKEN_AUTH_METHOD:-client_secret_post}
      OIDC_DEFAULT_ROLE: ${OIDC_DEFAULT_ROLE:-VIEWER}
      OIDC_SUPER_ADMIN_EMAILS: ${OIDC_SUPER_ADMIN_EMAILS:-admin@local.test}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma generate && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flathackswiki-ui
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
