services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wikiuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-flathacks_wiki}"
    volumes:
      - flathackswiki_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikiuser} -d ${POSTGRES_DB:-flathacks_wiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/flathack/openclaw-wiki-backend:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://wikiuser:change-me-postgres-password@postgres:5432/flathacks_wiki?schema=public}"
      JWT_SECRET: "${JWT_SECRET:-change-this-super-secret-jwt-key-in-production-minimum-32-chars}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-15m}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      APP_ENV: "${APP_ENV:-production}"
      APP_PORT: "${API_PORT:-3001}"
      APP_URL: "${APP_URL:-http://localhost:3002}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3002}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3002}"
      STORAGE_TYPE: "local"
      STORAGE_LOCAL_PATH: "/app/uploads"
      NEXTCLOUD_URL: "${NEXTCLOUD_PUBLIC_URL:-https://localhost:8443}"
      NEXTCLOUD_INTERNAL_URL: "${NEXTCLOUD_INTERNAL_URL:-http://nextcloud}"
      NEXTCLOUD_PUBLIC_URL: "${NEXTCLOUD_PUBLIC_URL:-https://localhost:8443}"
      NEXTCLOUD_APP_PASSWORD_USER: "${NEXTCLOUD_APP_PASSWORD_USER:-}"
      NEXTCLOUD_USERNAME: "${NEXTCLOUD_USERNAME:-}"
      NEXTCLOUD_APP_PASSWORD: "${NEXTCLOUD_APP_PASSWORD:-}"
      NEXTCLOUD_CALENDAR_LOOKAHEAD_DAYS: "${NEXTCLOUD_CALENDAR_LOOKAHEAD_DAYS:-14}"
      OIDC_ENABLED: "${OIDC_ENABLED:-true}"
      OIDC_PROVIDER_NAME: "${OIDC_PROVIDER_NAME:-Single Sign-On}"
      OIDC_ISSUER: "${OIDC_ISSUER:-http://keycloak:8080/realms/flathackwiki}"
      OIDC_PUBLIC_ISSUER: "${OIDC_PUBLIC_ISSUER:-https://localhost:8081/realms/flathackwiki}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-flathackwiki}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-ChangeMeWikiOidcClient1234}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-http://localhost:3002/api/v1/auth/oidc/callback}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid email profile}"
      OIDC_TOKEN_AUTH_METHOD: "${OIDC_TOKEN_AUTH_METHOD:-client_secret_post}"
      OIDC_DEFAULT_ROLE: "${OIDC_DEFAULT_ROLE:-VIEWER}"
      OIDC_SUPER_ADMIN_EMAILS: "${OIDC_SUPER_ADMIN_EMAILS:-admin@example.com}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-ChangeMe1234}"
      ADMIN_NAME: "${ADMIN_NAME:-FlatHacksWiki Admin}"
      ADMIN_RESET_PASSWORD: "${ADMIN_RESET_PASSWORD:-false}"
    volumes:
      - flathackswiki_uploads:/app/uploads

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/flathack/openclaw-wiki-frontend:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3002}:80"

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${KEYCLOAK_DB_USER:-keycloak}"
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db-password}"
      POSTGRES_DB: "${KEYCLOAK_DB_NAME:-keycloak}"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db-password}"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-ChangeMeKeycloak1234}"
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-https:
    image: ${NGINX_IMAGE:-nginx:alpine}
    restart: unless-stopped
    environment:
      KEYCLOAK_TLS_HOST: "${KEYCLOAK_TLS_HOST:-localhost}"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache openssl >/dev/null
        mkdir -p /certs
        if [ ! -f /certs/keycloak.crt ] || [ ! -f /certs/keycloak.key ]; then
          openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
            -keyout /certs/keycloak.key \
            -out /certs/keycloak.crt \
            -subj "/CN=${KEYCLOAK_TLS_HOST}" \
            -addext "subjectAltName=IP:${KEYCLOAK_TLS_HOST},DNS:${KEYCLOAK_TLS_HOST}"
        fi
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen 443 ssl;
          server_name ${KEYCLOAK_TLS_HOST};

          ssl_certificate /certs/keycloak.crt;
          ssl_certificate_key /certs/keycloak.key;

          location / {
            proxy_pass http://keycloak:8080;
            proxy_http_version 1.1;
            proxy_set_header Host ${KEYCLOAK_TLS_HOST}:${KEYCLOAK_PORT:-8081};
            proxy_set_header X-Forwarded-Host ${KEYCLOAK_TLS_HOST}:${KEYCLOAK_PORT:-8081};
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port ${KEYCLOAK_PORT:-8081};
          }
        }
        EOF
        nginx -g 'daemon off;'
    ports:
      - "${KEYCLOAK_PORT:-8081}:443"
    volumes:
      - keycloak_proxy_certs:/certs
    depends_on:
      keycloak:
        condition: service_started

  keycloak-bootstrap:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        log() { echo "[keycloak-bootstrap] $$*"; }
        kcadm_cmd() { /opt/keycloak/bin/kcadm.sh "$$@"; }
        extract_id() { tr -d '\n' | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'; }
        wait_for_keycloak() {
          attempt=0
          until kcadm_cmd config credentials --server "$$KEYCLOAK_URL" --realm master --user "$$KEYCLOAK_ADMIN" --password "$$KEYCLOAK_ADMIN_PASSWORD" >/dev/null 2>&1; do
            attempt=$$((attempt + 1))
            if [ "$$attempt" -ge 90 ]; then
              log "Keycloak ist nicht rechtzeitig erreichbar geworden."
              exit 1
            fi
            sleep 2
          done
        }
        realm_exists() { kcadm_cmd get "realms/$$OIDC_REALM" >/dev/null 2>&1; }
        client_uuid() { kcadm_cmd get clients -r "$$OIDC_REALM" -q clientId="$$1" --fields id,clientId 2>/dev/null | extract_id || true; }
        user_uuid() { kcadm_cmd get users -r "$$OIDC_REALM" -q username="$$1" --fields id,username 2>/dev/null | extract_id || true; }
        ensure_realm() {
          if realm_exists; then
            log "Realm $$OIDC_REALM existiert bereits."
            kcadm_cmd update "realms/$$OIDC_REALM" -s enabled=true -s loginWithEmailAllowed=true -s duplicateEmailsAllowed=false -s resetPasswordAllowed=true -s sslRequired=NONE >/dev/null
            return
          fi
          log "Lege Realm $$OIDC_REALM an."
          kcadm_cmd create realms -s realm="$$OIDC_REALM" -s enabled=true -s loginWithEmailAllowed=true -s duplicateEmailsAllowed=false -s resetPasswordAllowed=true -s sslRequired=NONE
        }
        write_client_payload() {
          cat > /tmp/client.json <<EOF
        {
          "clientId": "$$1",
          "name": "$$1",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "secret": "$$2",
          "rootUrl": "$$3",
          "baseUrl": "$$6",
          "adminUrl": "$$6",
          "redirectUris": ["$$4"],
          "webOrigins": ["$$5"]
        }
        EOF
        }
        ensure_client() {
          write_client_payload "$$1" "$$2" "$$3" "$$4" "$$5" "$$6"
          existing_id="$(client_uuid "$$1")"
          if [ -z "$$existing_id" ]; then
            log "Lege Client $$1 an."
            kcadm_cmd create clients -r "$$OIDC_REALM" -f /tmp/client.json >/dev/null
            return
          fi
          log "Aktualisiere Client $$1."
          kcadm_cmd update "clients/$$existing_id" -r "$$OIDC_REALM" -f /tmp/client.json >/dev/null
        }
        ensure_user() {
          existing_id="$(user_uuid "$$1")"
          if [ -z "$$existing_id" ]; then
            log "Lege Benutzer $$1 an."
            kcadm_cmd create users -r "$$OIDC_REALM" -s username="$$1" -s enabled=true -s emailVerified=true -s email="$$2" -s firstName="$$3" -s lastName="$$4" >/dev/null
          else
            log "Aktualisiere Benutzer $$1."
            kcadm_cmd update "users/$$existing_id" -r "$$OIDC_REALM" -s username="$$1" -s enabled=true -s emailVerified=true -s email="$$2" -s firstName="$$3" -s lastName="$$4" >/dev/null
          fi
          kcadm_cmd set-password -r "$$OIDC_REALM" --username "$$1" --new-password "$$5" >/dev/null
        }
        ensure_optional_user() {
          if [ -z "$$1" ] || [ -z "$$5" ]; then
            return
          fi
          ensure_user "$$1" "$$2" "$$3" "$$4" "$$5"
        }
        wait_for_keycloak
        ensure_realm
        ensure_client "$$WIKI_OIDC_CLIENT_ID" "$$WIKI_OIDC_CLIENT_SECRET" "$$WIKI_FRONTEND_URL" "$$WIKI_APP_URL/api/v1/auth/oidc/callback" "$$WIKI_FRONTEND_URL" "$$WIKI_FRONTEND_URL"
        ensure_client "$$NEXTCLOUD_OIDC_CLIENT_ID" "$$NEXTCLOUD_OIDC_CLIENT_SECRET" "$$NEXTCLOUD_PUBLIC_URL" "$$NEXTCLOUD_PUBLIC_URL/apps/user_oidc/code" "$$NEXTCLOUD_PUBLIC_URL" "$$NEXTCLOUD_PUBLIC_URL"
        ensure_user admin "$$KEYCLOAK_TEST_ADMIN_EMAIL" Admin Local "$$KEYCLOAK_TEST_ADMIN_PASSWORD"
        ensure_optional_user "$$KEYCLOAK_DEMO_USER_1_USERNAME" "$$KEYCLOAK_DEMO_USER_1_EMAIL" "$$KEYCLOAK_DEMO_USER_1_FIRST_NAME" "$$KEYCLOAK_DEMO_USER_1_LAST_NAME" "$$KEYCLOAK_DEMO_USER_1_PASSWORD"
        ensure_optional_user "$$KEYCLOAK_DEMO_USER_2_USERNAME" "$$KEYCLOAK_DEMO_USER_2_EMAIL" "$$KEYCLOAK_DEMO_USER_2_FIRST_NAME" "$$KEYCLOAK_DEMO_USER_2_LAST_NAME" "$$KEYCLOAK_DEMO_USER_2_PASSWORD"
        log "Keycloak-OIDC-Bootstrap abgeschlossen."
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-ChangeMeKeycloak1234}"
      OIDC_REALM: "${OIDC_REALM:-flathackwiki}"
      WIKI_OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-flathackwiki}"
      WIKI_OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-ChangeMeWikiOidcClient1234}"
      WIKI_APP_URL: "${APP_URL:-http://localhost:3002}"
      WIKI_FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3002}"
      NEXTCLOUD_OIDC_CLIENT_ID: "${NEXTCLOUD_OIDC_CLIENT_ID:-nextcloud}"
      NEXTCLOUD_OIDC_CLIENT_SECRET: "${NEXTCLOUD_OIDC_CLIENT_SECRET:-ChangeMeNextcloudOidcClient1234}"
      NEXTCLOUD_PUBLIC_URL: "${NEXTCLOUD_PUBLIC_URL:-https://localhost:8443}"
      KEYCLOAK_TEST_ADMIN_EMAIL: "${KEYCLOAK_TEST_ADMIN_EMAIL:-admin@local.test}"
      KEYCLOAK_TEST_ADMIN_PASSWORD: "${KEYCLOAK_TEST_ADMIN_PASSWORD:-ChangeMeKeycloak1234}"
      KEYCLOAK_DEMO_USER_1_USERNAME: "${KEYCLOAK_DEMO_USER_1_USERNAME:-}"
      KEYCLOAK_DEMO_USER_1_EMAIL: "${KEYCLOAK_DEMO_USER_1_EMAIL:-}"
      KEYCLOAK_DEMO_USER_1_FIRST_NAME: "${KEYCLOAK_DEMO_USER_1_FIRST_NAME:-}"
      KEYCLOAK_DEMO_USER_1_LAST_NAME: "${KEYCLOAK_DEMO_USER_1_LAST_NAME:-}"
      KEYCLOAK_DEMO_USER_1_PASSWORD: "${KEYCLOAK_DEMO_USER_1_PASSWORD:-}"
      KEYCLOAK_DEMO_USER_2_USERNAME: "${KEYCLOAK_DEMO_USER_2_USERNAME:-}"
      KEYCLOAK_DEMO_USER_2_EMAIL: "${KEYCLOAK_DEMO_USER_2_EMAIL:-}"
      KEYCLOAK_DEMO_USER_2_FIRST_NAME: "${KEYCLOAK_DEMO_USER_2_FIRST_NAME:-}"
      KEYCLOAK_DEMO_USER_2_LAST_NAME: "${KEYCLOAK_DEMO_USER_2_LAST_NAME:-}"
      KEYCLOAK_DEMO_USER_2_PASSWORD: "${KEYCLOAK_DEMO_USER_2_PASSWORD:-}"
    depends_on:
      keycloak:
        condition: service_started

  nextcloud-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${NEXTCLOUD_DB_NAME:-nextcloud}"
      POSTGRES_USER: "${NEXTCLOUD_DB_USER:-nextcloud}"
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD:-ChangeMeNextcloudDb1234}"
    volumes:
      - nextcloud_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXTCLOUD_DB_USER:-nextcloud} -d ${NEXTCLOUD_DB_NAME:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - nextcloud_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud:
    image: ${NEXTCLOUD_IMAGE:-nextcloud:stable-apache}
    container_name: ${NEXTCLOUD_CONTAINER_NAME:-flathackwiki-nextcloud}
    restart: unless-stopped
    ports:
      - "${NEXTCLOUD_HTTP_PORT:-8080}:80"
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: "${NEXTCLOUD_DB_NAME:-nextcloud}"
      POSTGRES_USER: "${NEXTCLOUD_DB_USER:-nextcloud}"
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD:-ChangeMeNextcloudDb1234}"
      REDIS_HOST: "nextcloud-redis"
      NEXTCLOUD_ADMIN_USER: "${NEXTCLOUD_ADMIN_USER:-admin}"
      NEXTCLOUD_ADMIN_PASSWORD: "${NEXTCLOUD_ADMIN_PASSWORD:-ChangeMeNextcloud1234}"
      NEXTCLOUD_TRUSTED_DOMAINS: "${NEXTCLOUD_TRUSTED_DOMAINS:-localhost 127.0.0.1}"
      OVERWRITEHOST: "${NEXTCLOUD_OVERWRITEHOST:-localhost:8443}"
      OVERWRITEPROTOCOL: "${NEXTCLOUD_OVERWRITEPROTOCOL:-https}"
      OVERWRITECLIURL: "${NEXTCLOUD_PUBLIC_URL:-https://localhost:8443}"
      PHP_MEMORY_LIMIT: "${NEXTCLOUD_PHP_MEMORY_LIMIT:-512M}"
      PHP_UPLOAD_LIMIT: "${NEXTCLOUD_PHP_UPLOAD_LIMIT:-512M}"
    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy

  nextcloud-https:
    image: ${NGINX_IMAGE:-nginx:alpine}
    restart: unless-stopped
    environment:
      NEXTCLOUD_TLS_HOST: "${NEXTCLOUD_TLS_HOST:-localhost}"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache openssl >/dev/null
        mkdir -p /etc/nginx/certs
        if [ ! -f /etc/nginx/certs/nextcloud.crt ] || [ ! -f /etc/nginx/certs/nextcloud.key ]; then
          openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
            -keyout /etc/nginx/certs/nextcloud.key \
            -out /etc/nginx/certs/nextcloud.crt \
            -subj "/CN=${NEXTCLOUD_TLS_HOST}" \
            -addext "subjectAltName=IP:${NEXTCLOUD_TLS_HOST},DNS:${NEXTCLOUD_TLS_HOST}"
        fi
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen 443 ssl;
          server_name ${NEXTCLOUD_TLS_HOST};

          ssl_certificate /etc/nginx/certs/nextcloud.crt;
          ssl_certificate_key /etc/nginx/certs/nextcloud.key;

          client_max_body_size 512M;

          location / {
            proxy_pass http://nextcloud:80;
            proxy_http_version 1.1;
            proxy_set_header Host ${NEXTCLOUD_TLS_HOST}:${NEXTCLOUD_HTTPS_PORT:-8443};
            proxy_set_header X-Forwarded-Proto https;
          }
        }
        EOF
        nginx -g 'daemon off;'
    ports:
      - "${NEXTCLOUD_HTTPS_PORT:-8443}:443"
    volumes:
      - nextcloud_caddy_data:/data
      - nextcloud_caddy_config:/config
    depends_on:
      nextcloud:
        condition: service_started

  nextcloud-oidc-bootstrap:
    image: ${DOCKER_CLI_IMAGE:-docker:cli}
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        log() { echo "[nextcloud-oidc-bootstrap] $$*"; }
        docker_exec() { docker exec "$$NEXTCLOUD_CONTAINER_NAME" sh -lc "$$1"; }
        occ() { docker_exec "su -s /bin/sh www-data -c 'php /var/www/html/occ $$*'"; }
        wait_for_nextcloud() {
          attempt=0
          until occ "status --output=json" 2>/dev/null | grep -q '"installed":true'; do
            attempt=$$((attempt + 1))
            if [ "$$attempt" -ge 120 ]; then
              log "Nextcloud ist nicht rechtzeitig bereit geworden."
              exit 1
            fi
            sleep 5
          done
        }
        install_oidc_ca() {
          if [ -z "$$OIDC_CA_CERT_PATH" ] || [ ! -f "$$OIDC_CA_CERT_PATH" ]; then
            return
          fi
          log "Installiere Keycloak-Zertifikat im Nextcloud-Container."
          docker cp "$$OIDC_CA_CERT_PATH" "$$NEXTCLOUD_CONTAINER_NAME:/usr/local/share/ca-certificates/flathack-keycloak.crt"
          docker_exec "update-ca-certificates >/dev/null 2>&1 || true"
        }
        wait_for_discovery() {
          attempt=0
          until docker_exec "php -r \"exit(@file_get_contents('$$OIDC_DISCOVERY_URI') === false ? 1 : 0);\"" >/dev/null 2>&1; do
            attempt=$$((attempt + 1))
            if [ "$$attempt" -ge 120 ]; then
              log "OIDC-Discovery ist nicht erreichbar: $$OIDC_DISCOVERY_URI"
              exit 1
            fi
            sleep 5
          done
        }
        provider_discovery_uri() {
          if [ -n "$$OIDC_PUBLIC_DISCOVERY_URI" ]; then
            printf '%s' "$$OIDC_PUBLIC_DISCOVERY_URI"
            return
          fi
          printf '%s' "$$OIDC_DISCOVERY_URI"
        }
        append_provider_option() {
          if printf '%s' "$$1" | grep -q -- "$$2"; then
            PROVIDER_OPTIONS="$$PROVIDER_OPTIONS $$2=$$3"
          fi
        }
        wait_for_nextcloud
        install_oidc_ca
        wait_for_discovery
        log "Installiere/aktiviere user_oidc."
        occ "app:install user_oidc" >/dev/null 2>&1 || true
        occ "app:enable user_oidc" >/dev/null 2>&1 || true
        log "Setze Nextcloud-Systemwerte fuer OIDC."
        occ "config:system:set allow_local_remote_servers --type=boolean --value=true"
        occ "config:system:set user_oidc login_label --type=string --value=Mit\ $$OIDC_PROVIDER_NAME\ anmelden"
        occ "config:system:set user_oidc default_token_endpoint_auth_method --type=string --value='client_secret_post'"
        occ "config:app:set --type=boolean --value=1 user_oidc allow_multiple_user_backends"
        occ "--no-interaction config:app:set --type=boolean --value=1 user_oidc allow_insecure_http"
        PROVIDER_HELP="$(occ "user_oidc:provider --help" 2>/dev/null || true)"
        PROVIDER_OPTIONS=""
        append_provider_option "$$PROVIDER_HELP" "--mapping-uid" "preferred_username"
        append_provider_option "$$PROVIDER_HELP" "--mapping-display-name" "name"
        append_provider_option "$$PROVIDER_HELP" "--mapping-email" "email"
        append_provider_option "$$PROVIDER_HELP" "--mapping-groups" "groups"
        append_provider_option "$$PROVIDER_HELP" "--group-provisioning" "1"
        append_provider_option "$$PROVIDER_HELP" "--unique-uid" "0"
        log "Konfiguriere den Nextcloud-OIDC-Provider."
        occ "user_oidc:provider $$OIDC_PROVIDER_NAME --clientid='$$NEXTCLOUD_OIDC_CLIENT_ID' --clientsecret='$$NEXTCLOUD_OIDC_CLIENT_SECRET' --discoveryuri='$(provider_discovery_uri)'$$PROVIDER_OPTIONS"
        log "Nextcloud-OIDC-Bootstrap abgeschlossen."
    environment:
      NEXTCLOUD_CONTAINER_NAME: "${NEXTCLOUD_CONTAINER_NAME:-flathackwiki-nextcloud}"
      NEXTCLOUD_OIDC_CLIENT_ID: "${NEXTCLOUD_OIDC_CLIENT_ID:-nextcloud}"
      NEXTCLOUD_OIDC_CLIENT_SECRET: "${NEXTCLOUD_OIDC_CLIENT_SECRET:-ChangeMeNextcloudOidcClient1234}"
      OIDC_CA_CERT_PATH: "${OIDC_CA_CERT_PATH:-/oidc-certs/keycloak.crt}"
      OIDC_DISCOVERY_URI: "${OIDC_DISCOVERY_URI:-http://keycloak:8080/realms/flathackwiki/.well-known/openid-configuration}"
      OIDC_PUBLIC_DISCOVERY_URI: "${OIDC_PUBLIC_DISCOVERY_URI:-https://localhost:8081/realms/flathackwiki/.well-known/openid-configuration}"
      OIDC_PROVIDER_NAME: "${OIDC_PROVIDER_NAME:-Single Sign-On}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - keycloak_proxy_certs:/oidc-certs:ro
    depends_on:
      nextcloud:
        condition: service_started
      keycloak-bootstrap:
        condition: service_completed_successfully

  nextcloud-cron:
    image: ${NEXTCLOUD_IMAGE:-nextcloud:stable-apache}
    restart: unless-stopped
    entrypoint: /cron.sh
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: "${NEXTCLOUD_DB_NAME:-nextcloud}"
      POSTGRES_USER: "${NEXTCLOUD_DB_USER:-nextcloud}"
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD:-ChangeMeNextcloudDb1234}"
      REDIS_HOST: "nextcloud-redis"
    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    depends_on:
      nextcloud:
        condition: service_started

volumes:
  flathackswiki_postgres_data:
  flathackswiki_uploads:
  keycloak_db_data:
  nextcloud_db:
  nextcloud_redis:
  keycloak_proxy_certs:
  nextcloud_data:
  nextcloud_config:
  nextcloud_apps:
  nextcloud_caddy_data:
  nextcloud_caddy_config:
