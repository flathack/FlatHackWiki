services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wikiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikipass}
      POSTGRES_DB: ${POSTGRES_DB:-flathacks_wiki}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikiuser} -d ${POSTGRES_DB:-flathacks_wiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/owner/openclaw-wiki-backend:latest}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://wikiuser:wikipass@postgres:5432/flathacks_wiki?schema=public}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 3001
      APP_URL: ${APP_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: /app/uploads
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-}
      NEXTCLOUD_INTERNAL_URL: ${NEXTCLOUD_INTERNAL_URL:-}
      NEXTCLOUD_PUBLIC_URL: ${NEXTCLOUD_PUBLIC_URL:-}
      NEXTCLOUD_APP_PASSWORD_USER: ${NEXTCLOUD_APP_PASSWORD_USER:-}
      NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME:-}
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
      NEXTCLOUD_CALENDAR_LOOKAHEAD_DAYS: ${NEXTCLOUD_CALENDAR_LOOKAHEAD_DAYS:-14}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-Zentrales Konto}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_PUBLIC_ISSUER: ${OIDC_PUBLIC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      OIDC_TOKEN_AUTH_METHOD: ${OIDC_TOKEN_AUTH_METHOD:-client_secret_post}
      OIDC_DEFAULT_ROLE: ${OIDC_DEFAULT_ROLE:-VIEWER}
      OIDC_SUPER_ADMIN_EMAILS: ${OIDC_SUPER_ADMIN_EMAILS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-FlatHacksWiki Admin}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-false}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/owner/openclaw-wiki-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
